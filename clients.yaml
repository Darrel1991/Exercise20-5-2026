# ─── How to add a new client ─────────────────────────────────────────────────
# 1. Copy the NEW_CLIENT block above
# 2. Replace NEW_CLIENT with your client code (e.g. PETRONAS)
# 3. Fill in name, zoho_project_id, zoho_project_name, description
# 4. Choose which agents to run for this client
# 5. Save this file — no restart needed
# 6. Run: /pipeline_review "client=PETRONAS subject=your review topic"
